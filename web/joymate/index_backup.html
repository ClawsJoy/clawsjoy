<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Joy Mate - AI助手</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0f0f1a;color:#fff;font-family:system-ui}
        .app{display:flex;height:100vh}
        .sidebar{width:200px;background:#0a0a14;padding:20px;overflow-y:auto}
        .logo{font-size:20px;color:#667eea;margin-bottom:30px}
        .service{padding:10px;background:#1a1a2e;border-radius:10px;margin:10px 0;cursor:pointer;text-align:center}
        .service:hover{background:#2a2a3e}
        .main{flex:1;display:flex;flex-direction:column}
        .chat{flex:1;overflow:auto;padding:20px}
        .msg{margin:10px 0;padding:10px 15px;border-radius:18px;max-width:75%;font-size:14px}
        .user{background:#667eea;margin-left:auto;text-align:right}
        .bot{background:#2a2a3e}
        .mic-area{text-align:center;padding:16px}
        .mic-btn{width:70px;height:70px;border-radius:50%;background:#667eea;border:none;font-size:32px;cursor:pointer;transition:0.2s}
        .mic-btn.listening{background:#f56565;animation:pulse 1s infinite}
        @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
        .mic-status{font-size:12px;color:#888;margin-top:8px}
        .recognized{font-size:13px;color:#667eea;margin-top:5px}
        .input-area{display:flex;padding:12px 20px;gap:10px;border-top:1px solid #222}
        input{flex:1;padding:10px;background:#1a1a2e;border:1px solid #333;border-radius:30px;color:#fff}
        button{padding:10px 20px;background:#667eea;border:none;border-radius:30px;color:#fff;cursor:pointer}
        .task-panel{width:260px;background:#0a0a14;padding:20px;overflow-y:auto}
        .task-header{font-size:12px;color:#666;margin-bottom:15px}
        .task-item{background:#1a1a2e;padding:10px;margin:8px 0;border-radius:10px;cursor:pointer}
        .task-item:hover{background:#2a2a3e}
        .task-title{font-size:13px;color:#667eea}
        .task-time{font-size:10px;color:#666;margin-top:4px}
        .modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.9);justify-content:center;align-items:center;z-index:1000}
        .modal-content{background:#1a1a2e;padding:20px;border-radius:20px;width:90%;max-width:500px}
        video{width:100%;border-radius:10px}
    </style>
</head>
<body>
<div class="app">
    <div class="sidebar">
    <div style="padding:10px">
      <select id="tenantSelect" style="width:100%;padding:8px;background:#1a1a2e;color:#fff;border:1px solid #333;border-radius:8px">
        <option value="1">租户 1</option>
        <option value="2">租户 2</option>
        <option value="3">租户 3</option>
      </select>
    </div>
        <div class="logo">🦞 Joy Mate</div>
        <div class="service" onclick="quickAsk('制作香港宣传片')">🎬 宣传片</div>
        <div class="service" onclick="quickAsk('我想喝咖啡')">☕ 咖啡</div>
    </div>
    <div class="main">
        <div class="chat" id="chat"></div>
        <div class="mic-area">
            <button class="mic-btn" id="micBtn" onclick="toggleVoice()">🎤</button>
            <div class="mic-status" id="status">⚡ 点击说话</div>
            <div class="recognized" id="recognized"></div>
            <div class="input-area">
                <input type="text" id="textInput" placeholder="输入..." onkeypress="if(event.keyCode===13)sendMsg()">
                <button onclick="sendMsg()">发送</button>
            </div>
        </div>
    </div>
    <div class="task-panel">
        <div class="task-header">📋 任务清单</div>
        <div id="taskList"></div>
    </div>
</div>
<div id="modal" class="modal"><div class="modal-content" id="modalContent"></div></div>

<script>
// ============ 品牌音乐 ============
let audioCtx = null;
let lastInteractionTime = 0;
const INTERVAL_MS = 5 * 60 * 1000; // 5分钟无交互后重新播放

function playBrandMusic() {
    const now = Date.now();
    // 条件：首次使用 或 距上次交互超过5分钟
    if (lastInteractionTime !== 0 && (now - lastInteractionTime) < INTERVAL_MS) {
        return; // 间隔内不播放
    }
    lastInteractionTime = now;
    
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
        audioCtx.resume();
    }
    
    const nowTime = audioCtx.currentTime;
    const masterGain = audioCtx.createGain();
    masterGain.connect(audioCtx.destination);
    masterGain.gain.value = 0.25;
    
    // 简短的品牌音效 (0.8秒)
    const notes = [523.25, 659.25, 783.99];
    notes.forEach((freq, i) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        osc.connect(gain);
        gain.connect(masterGain);
        gain.gain.setValueAtTime(0.15, nowTime + i * 0.15);
        gain.gain.exponentialRampToValueAtTime(0.001, nowTime + i * 0.15 + 0.3);
        osc.start();
        osc.stop(nowTime + i * 0.15 + 0.3);
    });
    
    // 低音
    const bass = audioCtx.createOscillator();
    const bassGain = audioCtx.createGain();
    bass.type = 'triangle';
    bass.frequency.value = 130.81;
    bass.connect(bassGain);
    bassGain.connect(masterGain);
    bassGain.gain.setValueAtTime(0.1, nowTime);
    bassGain.gain.exponentialRampToValueAtTime(0.001, nowTime + 0.7);
    bass.start();
    bass.stop(nowTime + 0.7);
}

// ============ 语音识别与交互 ============
let tasks = JSON.parse(localStorage.getItem('joymate_tasks') || '[]');
let listening = false, recognition = null, synth = null;
let currentResponse = null;

function addMsg(role, text, noSpeak = false) {
    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    div.innerText = text;
    chat.appendChild(div);
    div.scrollIntoView();
    if (role === 'bot' && !noSpeak && text.length < 80 && synth) {
        // 延迟播放音乐，然后再语音
        playBrandMusic();
        setTimeout(() => {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-CN';
            utterance.rate = 0.9;
            synth.speak(utterance);
        }, 200);
    }
}

function renderTasks() {
    const container = document.getElementById('taskList');
    if (!tasks.length) {
        container.innerHTML = '<div style="color:#555;text-align:center;padding:20px">暂无任务</div>';
        return;
    }
    container.innerHTML = tasks.map(t => `
        <div class="task-item" onclick="viewTask(${t.id})">
            <div class="task-title">${t.title}</div>
            <div class="task-time">${t.time}</div>
        </div>
    `).join('');
}

function addTask(title, videoUrl) {
    tasks.unshift({ id: Date.now(), title: title, videoUrl: videoUrl, time: new Date().toLocaleTimeString() });
    if (tasks.length > 20) tasks.pop();
    localStorage.setItem('joymate_tasks', JSON.stringify(tasks));
    renderTasks();
}

function viewTask(id) {
    const task = tasks.find(t => t.id === id);
    if (task && task.videoUrl) {
        const modal = document.getElementById('modal');
        const content = document.getElementById('modalContent');
        content.innerHTML = `<video controls autoplay src="${task.videoUrl}"></video><div style="text-align:center;margin-top:12px"><button onclick="closeModal()" style="background:#667eea;border:none;padding:6px 16px;border-radius:20px;color:#fff">关闭</button></div>`;
        modal.style.display = 'flex';
    }
}
function closeModal() { document.getElementById('modal').style.display = 'none'; }

async function quickAsk(q) {
    addMsg('user', q);
    await askAI(q);
}

async function sendMsg() {
    const input = document.getElementById('textInput');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    addMsg('user', text);
    await askAI(text);
}

async function askAI(q) {
    addMsg('bot', '🤔...', true);
    try {
        const res = await fetch('http://localhost:11434/api/generate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ model: 'qwen2.5:3b', prompt: `简短回答(40字内):${q}`, stream: false })
        });
        const data = await res.json();
        const reply = data.response || '收到';
        document.querySelector('.msg.bot:last-child').remove();
        addMsg('bot', reply.substring(0, 100));
    } catch(e) {
        document.querySelector('.msg.bot:last-child').remove();
        addMsg('bot', '网络错误');
    }
}

function initVoice() {
    if ('webkitSpeechRecognition' in window) {
        recognition = new webkitSpeechRecognition();
        recognition.continuous = false;
        recognition.interimResults = true;
        recognition.lang = 'zh-CN';
        recognition.onstart = () => {
            listening = true;
            document.getElementById('micBtn').classList.add('listening');
            document.getElementById('status').innerHTML = '🎤 聆听中...';
        };
        recognition.onend = () => {
            listening = false;
            document.getElementById('micBtn').classList.remove('listening');
            document.getElementById('status').innerHTML = '⚡ 点击说话';
        };
        recognition.onresult = (e) => {
            let final = '';
            for (let i = e.resultIndex; i < e.results.length; i++) {
                if (e.results[i].isFinal) final = e.results[i][0].transcript;
            }
            if (final) {
                document.getElementById('recognized').innerHTML = `"${final}"`;
                document.getElementById('textInput').value = final;
                sendMsg();
            }
        };
        recognition.onerror = () => {
            document.getElementById('status').innerHTML = '🎤 没听清，再试一次';
            listening = false;
            document.getElementById('micBtn').classList.remove('listening');
        };
    }
    if ('speechSynthesis' in window) synth = window.speechSynthesis;
}

function toggleVoice() {
    if (!recognition) { alert('请用Chrome浏览器'); return; }
    if (listening) {
        recognition.stop();
    } else {
        try {
            recognition.start();
        } catch(e) {
            document.getElementById('status').innerHTML = '🎤 请允许麦克风权限';
        }
    }
}

initVoice();
renderTasks();
</script>
</body>
</html>
