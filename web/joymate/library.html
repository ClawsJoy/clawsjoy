<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人资料库 - Joy Mate</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
        }
        
        /* 头部 */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }
        
        .nav-links {
            margin-top: 15px;
        }
        
        .nav-links a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            opacity: 0.8;
        }
        
        .nav-links a:hover {
            opacity: 1;
        }
        
        /* 文件夹弹板 */
        .folder-panel {
            background: white;
            border-radius: 15px;
            margin: 30px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        
        .folder-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #667eea;
        }
        
        .folder-header h2 {
            color: #333;
            font-size: 1.3em;
        }
        
        .upload-area {
            background: #f8f9fa;
            border: 2px dashed #667eea;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .upload-area:hover {
            background: #e8eaf6;
        }
        
        .upload-area p {
            color: #667eea;
            margin-top: 10px;
        }
        
        /* 文件网格 */
        .file-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .file-card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
        }
        
        .file-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
        }
        
        .file-card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }
        
        .file-info {
            padding: 12px;
        }
        
        .file-name {
            font-size: 13px;
            color: #333;
            margin-bottom: 5px;
            word-break: break-all;
        }
        
        .file-date {
            font-size: 11px;
            color: #999;
        }
        
        .status-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: bold;
        }
        
        .status-approved {
            background: #4caf50;
            color: white;
        }
        
        .status-pending {
            background: #ff9800;
            color: white;
        }
        
        /* 加载状态 */
        .loading {
            text-align: center;
            padding: 60px;
            color: #999;
        }
        
        /* 提示消息 */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            z-index: 1000;
            animation: fadeInOut 3s ease;
        }
        
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
        }
        
        .empty-state {
            text-align: center;
            padding: 60px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📁 个人资料库</h1>
        <p>系统自动入库 | 审核通过后永久保存</p>
        <div class="nav-links">
            <a href="/joymate/index.html">💬 对话</a>
            <a href="/joymate/editor.html">✏️ 编辑器</a>
            <a href="/joymate/library.html">📁 资料库</a>
            <a href="/index.html">🏠 首页</a>
        </div>
    </div>
    
    <div class="folder-panel">
        <div class="folder-header">
            <h2>📂 我的素材</h2>
            <span id="fileCount" style="color: #667eea;">0 个文件</span>
        </div>
        
        <!-- 上传区域 - 草稿箱入口 -->
        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
            📤 点击选择文件上传（原始资料 → 草稿箱）
            <p style="font-size: 12px; margin-top: 5px;">支持图片、视频、音频、文档</p>
        </div>
        <input type="file" id="fileInput" accept="image/*,video/*,audio/*,.pdf,.doc,.txt" multiple style="display: none;" onchange="uploadFiles(this)">
        
        <!-- 文件列表 -->
        <div id="fileList" class="file-grid">
            <div class="loading">📁 加载资料库中...</div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8093';
        let currentFiles = [];
        
        // 显示提示
        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            toast.style.background = isError ? '#f44336' : '#4caf50';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        // 加载资料库文件
        async function loadLibrary() {
            const container = document.getElementById('fileList');
            const countSpan = document.getElementById('fileCount');
            
            container.innerHTML = '<div class="loading">📁 加载资料库中...</div>';
            
            try {
                const response = await fetch(`${API_BASE}/api/tasks`);
                if (response.ok) {
                    const tasks = await response.json();
                    
                    if (tasks && tasks.length > 0) {
                        container.innerHTML = tasks.map(task => `
                            <div class="file-card">
                                <div class="status-badge status-approved">✅ 已入库</div>
                                <img src="https://picsum.photos/id/${Math.floor(Math.random() * 100) + 1}/300/200" alt="素材">
                                <div class="file-info">
                                    <div class="file-name">${task.type || '素材'} - ${task.data || '无描述'}</div>
                                    <div class="file-date">${new Date().toLocaleDateString()}</div>
                                </div>
                            </div>
                        `).join('');
                        countSpan.textContent = `${tasks.length} 个文件`;
                    } else {
                        container.innerHTML = '<div class="empty-state">📭 暂无资料，请上传文件</div>';
                        countSpan.textContent = '0 个文件';
                    }
                } else {
                    container.innerHTML = '<div class="empty-state">❌ 加载失败，请检查服务</div>';
                }
            } catch (error) {
                console.error('加载失败:', error);
                container.innerHTML = `<div class="empty-state">❌ 连接失败: ${error.message}</div>`;
            }
        }
        
        // 上传文件
        async function uploadFiles(input) {
            const files = input.files;
            if (!files.length) return;
            
            showToast(`📤 正在上传 ${files.length} 个文件到草稿箱...`);
            
            for (let file of files) {
                // 模拟上传，实际应调用后端API
                console.log('上传:', file.name);
                await new Promise(resolve => setTimeout(resolve, 500));
            }
            
            showToast(`✅ 已上传 ${files.length} 个文件，等待系统审核`);
            loadLibrary(); // 刷新列表
            input.value = '';
        }
        
        // 刷新
        async function refresh() {
            showToast('🔄 刷新资料库...');
            await loadLibrary();
            showToast('✅ 刷新完成');
        }
        
        // 初始化
        loadLibrary();
        
        // 每30秒自动刷新
        setInterval(loadLibrary, 30000);
    </script>
</body>
</html>
