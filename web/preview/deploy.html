<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>部署任务预览</title>
<style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:monospace;padding:30px;background:#1a1a2e;color:#fff;min-height:100vh;}
    .container{max-width:900px;margin:0 auto;}
    h1{color:#667eea;margin-bottom:20px;}
    .cmd-box{background:#0d0d1a;padding:20px;border-radius:12px;border-left:4px solid #10b981;margin:20px 0;}
    .cmd{font-family:monospace;color:#50fa7b;font-size:14px;white-space:pre-wrap;word-break:break-all;}
    .desc-box{background:rgba(255,255,255,0.1);padding:15px;border-radius:8px;margin:20px 0;}
    .btn{background:#667eea;border:none;padding:10px 24px;border-radius:8px;color:#fff;cursor:pointer;margin-top:20px;}
    hr{margin:20px 0;border-color:#333;}
</style>
</head>
<body>
<div class="container">
    <h1>🔧 部署任务临时预览</h1>
    <div id="content"></div>
    <button class="btn" onclick="window.close()">关闭窗口</button>
</div>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const cmd = urlParams.get('cmd') || '';
    const desc = urlParams.get('desc') || '';
    
    document.getElementById('content').innerHTML = `
        <div class="cmd-box">
            <div style="color:#10b981;margin-bottom:10px;">📋 执行命令</div>
            <div class="cmd">$ ${decodeURIComponent(cmd)}</div>
        </div>
        ${desc ? `<div class="desc-box"><div style="color:#667eea;margin-bottom:5px;">📝 描述</div><div>${decodeURIComponent(desc)}</div></div>` : ''}
        <hr>
        <div style="color:#666;font-size:12px;">⚠️ 此页面为临时预览，请确认命令正确后关闭</div>
    `;
</script>
</body>
</html>
