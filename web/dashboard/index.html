<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>ClawsJoy 数据看板</title>
<style>
body{background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff;font-family:Arial;padding:20px;}
.container{max-width:1200px;margin:0 auto;}
h1{color:#667eea;}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin:20px 0;}
.stat-card{background:rgba(255,255,255,0.1);padding:20px;border-radius:16px;text-align:center;}
.stat-number{font-size:48px;font-weight:bold;color:#667eea;}
.stat-label{color:#aaa;margin-top:10px;}
</style>
</head>
<body>
<div class="container">
    <h1>📊 ClawsJoy 数据看板</h1>
    <div class="stats" id="stats">
        <div class="stat-card"><div class="stat-number" id="total">-</div><div class="stat-label">总任务</div></div>
        <div class="stat-card"><div class="stat-number" id="pending">-</div><div class="stat-label">待审核</div></div>
        <div class="stat-card"><div class="stat-number" id="approved">-</div><div class="stat-label">已通过</div></div>
        <div class="stat-card"><div class="stat-number" id="rejected">-</div><div class="stat-label">已驳回</div></div>
    </div>
    <p style="text-align:center;color:#aaa;">数据每30秒自动刷新</p>
</div>
<script>
async function loadStats() {
    try {
        const resp = await fetch('http://localhost:5006/api/stats/overview');
        const data = await resp.json();
        document.getElementById('total').innerText = data.total;
        document.getElementById('pending').innerText = data.pending;
        document.getElementById('approved').innerText = data.approved;
        document.getElementById('rejected').innerText = data.rejected;
    } catch(e) {
        console.error('加载失败:', e);
    }
}
loadStats();
setInterval(loadStats, 30000);
</script>
</body>
</html>
