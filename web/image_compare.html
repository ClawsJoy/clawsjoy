<!DOCTYPE html>
<html>
<head>
    <title>ImageMagick 效果对比</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f0f0f0; }
        .compare { display: flex; gap: 20px; flex-wrap: wrap; }
        .item { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); max-width: 500px; }
        img { max-width: 100%; border: 1px solid #ddd; }
        .step { font-size: 12px; color: #666; margin-top: 5px; }
        h3 { margin: 0 0 10px 0; }
    </style>
</head>
<body>
    <h2>🖼️ ImageMagick 图片处理效果对比</h2>
    <div class="compare">
        <div class="item">
            <h3>📷 原图</h3>
            <img src="/images/test_original.jpg">
            <div class="step">原始尺寸: 1080x608</div>
        </div>
        <div class="item">
            <h3>✨ 处理后</h3>
            <img src="/images/test_final.jpg">
            <div class="step">1920x1080 + 对比度 + 锐化 + 色彩增强</div>
        </div>
    </div>
    <div class="compare" style="margin-top: 20px;">
        <div class="item">
            <h3>📐 步骤1: 尺寸统一</h3>
            <img src="/images/test_step1.jpg">
        </div>
        <div class="item">
            <h3>🎨 步骤2: 对比度增强</h3>
            <img src="/images/test_step2.jpg">
        </div>
        <div class="item">
            <h3>🔍 步骤3: 锐化</h3>
            <img src="/images/test_step3.jpg">
        </div>
    </div>
    <hr>
    <p><strong>处理命令:</strong><br>
    <code>convert 原图 -resize 1920x1080^ -gravity center -extent 1920x1080 -contrast -contrast -sharpen 0x1 -modulate 100,120,100 输出图</code></p>
</body>
</html>
