<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>租户登录 - Joy Mate</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-container {
            background: rgba(255,255,255,0.05);
            border-radius: 24px;
            padding: 40px;
            width: 400px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .logo {
            text-align: center;
            font-size: 48px;
            margin-bottom: 20px;
        }
        h1 {
            text-align: center;
            color: #667eea;
            font-size: 24px;
            margin-bottom: 8px;
        }
        .subtitle {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #aaa;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
        }
        input:focus {
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }
        .error {
            background: rgba(245,101,101,0.2);
            border: 1px solid #f56565;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 20px;
            color: #f56565;
            font-size: 14px;
            text-align: center;
        }
        .tenant-select {
            margin-bottom: 20px;
        }
        select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 14px;
            outline: none;
        }
    </style>
</head>
<body>
<div class="login-container">
    <div class="logo">🦞</div>
    <h1>Joy Mate</h1>
    <div class="subtitle">租户专属 AI 助手</div>
    
    <div id="errorMsg" class="error" style="display:none"></div>
    
    <div class="tenant-select">
        <label>选择租户</label>
        <select id="tenantSelect">
            <option value="1">租户 1 - 默认账户</option>
            <option value="2">租户 2 - 测试账户</option>
            <option value="3">租户 3 - 开发账户</option>
        </select>
    </div>
    
    <div class="input-group">
        <label>用户名</label>
        <input type="text" id="username" placeholder="请输入用户名" value="admin">
    </div>
    
    <div class="input-group">
        <label>密码</label>
        <input type="password" id="password" placeholder="请输入密码" value="admin123">
    </div>
    
    <button onclick="login()">登录</button>
</div>

<script>
    async function login() {
        const tenantId = document.getElementById('tenantSelect').value;
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const errorDiv = document.getElementById('errorMsg');
        
        errorDiv.style.display = 'none';
        
        try {
            const res = await fetch('http://localhost:8092/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            
            if (data.success) {
                // 保存租户信息和 token
                localStorage.setItem('joymate_token', data.token);
                localStorage.setItem('joymate_tenant', tenantId);
                localStorage.setItem('joymate_user', JSON.stringify(data.user));
                
                // 跳转到主界面，带上租户参数
                window.location.href = `/joymate/index.html?tenant=${tenantId}`;
            } else {
                errorDiv.innerText = data.error || '登录失败';
                errorDiv.style.display = 'block';
            }
        } catch(e) {
            errorDiv.innerText = '网络错误，请稍后重试';
            errorDiv.style.display = 'block';
        }
    }
</script>
</body>
</html>
