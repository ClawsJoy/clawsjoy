<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joy Mate</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui; background: #0a0a14; color: #fff; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .container { width: 100%; max-width: 800px; height: 100vh; display: flex; flex-direction: column; }
        .header { padding: 20px; border-bottom: 1px solid #2a2a3e; display: flex; justify-content: space-between; align-items: center; }
        .voice-toggle { background: #2a2a3e; border: none; border-radius: 20px; padding: 6px 12px; color: #fff; cursor: pointer; font-size: 12px; }
        .chat { flex: 1; overflow-y: auto; padding: 20px; }
        .msg { margin-bottom: 12px; display: flex; }
        .user { justify-content: flex-end; }
        .bot { justify-content: flex-start; }
        .msg-content { max-width: 70%; padding: 10px 16px; border-radius: 18px; }
        .user .msg-content { background: #667eea; }
        .bot .msg-content { background: #2a2a3e; }
        .input-area { display: flex; gap: 10px; padding: 16px; border-top: 1px solid #2a2a3e; }
        input { flex: 1; padding: 12px; background: #1a1a2e; border: 1px solid #2a2a3e; border-radius: 24px; color: #fff; outline: none; }
        button { padding: 12px 24px; background: #667eea; border: none; border-radius: 24px; color: #fff; cursor: pointer; }
        a { color: #667eea; text-decoration: none; margin-left: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🦞 Joy Mate</h1>
            <button class="voice-toggle" id="voiceToggle" onclick="toggleVoice()">🔊 语音开</button>
        </div>
        <div class="chat" id="chat"></div>
        <div class="input-area">
            <input type="text" id="message" placeholder="输入消息..." onkeypress="if(event.keyCode===13)send()">
            <button onclick="send()">发送</button>
            <a href="/joymate/library.html?tenant=1" target="_blank">📁 资料库</a>
        </div>
    </div>
    <script>
        const tenantId = new URLSearchParams(location.search).get('tenant') || '1';
        const API = `http://localhost:8084`;
        const TTS_API = `http://localhost:9000/api/tts`;
        let voiceEnabled = true;
        
        function toggleVoice() {
            voiceEnabled = !voiceEnabled;
            const btn = document.getElementById('voiceToggle');
            btn.textContent = voiceEnabled ? '🔊 语音开' : '🔇 语音关';
            btn.style.background = voiceEnabled ? '#2a2a3e' : '#4a4a5e';
        }
        
        function speak(text) {
            if (!voiceEnabled) return;
            fetch(TTS_API, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: text })
            })
            .then(res => res.blob())
            .then(blob => {
                const url = URL.createObjectURL(blob);
                const audio = new Audio(url);
                audio.play();
                audio.onended = () => URL.revokeObjectURL(url);
            })
            .catch(e => console.log('TTS 错误:', e));
        }
        
        function addMsg(role, text) {
            const chat = document.getElementById('chat');
            const div = document.createElement('div');
            div.className = `msg ${role}`;
            div.innerHTML = `<div class="msg-content">${text}</div>`;
            chat.appendChild(div);
            div.scrollIntoView();
            if (role === 'bot') speak(text);
        }
        
        async function send() {
            const input = document.getElementById('message');
            const text = input.value.trim();
            if (!text) return;
            addMsg('user', text);
            input.value = '';
            
            try {
                const res = await fetch(`${API}/api/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, tenant_id: tenantId })
                });
                const data = await res.json();
                addMsg('bot', data.message || '收到');
            } catch(e) {
                addMsg('bot', '网络错误: ' + e.message);
            }
        }
        
        addMsg('bot', '你好！我是 Joy Mate，有什么可以帮你的？');
    </script>
</body>
</html>
