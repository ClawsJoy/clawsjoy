# ClawsJoy 模型配置 - 可随意切换

# 当前使用的模型
current: qwen2.5:7b

# 可用模型列表
models:
  # 本地 Ollama 模型
  - name: qwen2.5:7b
    provider: ollama
    endpoint: http://localhost:11434
    type: chat
    enabled: true
    
  - name: qwen2.5:3b
    provider: ollama
    endpoint: http://localhost:11434
    type: chat
    enabled: true
    
  - name: llama3.2:3b
    provider: ollama
    endpoint: http://localhost:11434
    type: chat
    enabled: true
  
  # 云端 API（需配置密钥）
  - name: gpt-4o
    provider: openai
    endpoint: https://api.openai.com/v1
    api_key: ${OPENAI_API_KEY}
    type: chat
    enabled: false
    
  - name: claude-3
    provider: anthropic
    endpoint: https://api.anthropic.com/v1
    api_key: ${ANTHROPIC_API_KEY}
    type: chat
    enabled: false
    
  - name: gemini-pro
    provider: google
    endpoint: https://generativelanguage.googleapis.com/v1
    api_key: ${GOOGLE_API_KEY}
    type: chat
    enabled: false

# 路由规则
routes:
  - intent: "聊天|对话|hello"
    model: qwen2.5:7b
  - intent: "代码|编程|debug"
    model: qwen2.5:7b
  - intent: "创意|写作|文案"
    model: qwen2.5:7b
