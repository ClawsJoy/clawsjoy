<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ClawsJoy 管理员面板</title>
    <style>
        body { font-family: Arial; background: #1e1e2e; color: #fff; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .card { background: #2a2a3e; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        h1 { color: #667eea; }
        .listing { border-left: 4px solid #f59e0b; margin: 10px 0; padding: 15px; background: #1a1a2e; }
        .status-pending { color: #f59e0b; }
        .status-approved { color: #10b981; }
        button { background: #667eea; border: none; padding: 8px 16px; color: white; border-radius: 5px; cursor: pointer; margin-right: 10px; }
        .danger { background: #ef4444; }
        .success { background: #10b981; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #3a3a4e; }
        th { color: #a1a1aa; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 ClawsJoy 管理员面板</h1>
        
        <div class="card">
            <h2>📊 系统统计</h2>
            <div id="stats"></div>
        </div>
        
        <div class="card">
            <h2>⏳ 待审核上架申请</h2>
            <div id="pendingListings"></div>
        </div>
        
        <div class="card">
            <h2>✅ 已批准技能</h2>
            <div id="approvedListings"></div>
        </div>
    </div>
    
    <script>
        async function loadStats() {
            try {
                const brainRes = await fetch('/api/brain/stats');
                const brain = await brainRes.json();
                const marketRes = await fetch('/api/marketplace/list');
                const market = await marketRes.json();
                document.getElementById('stats').innerHTML = `
                    <table>
                        <tr><th>指标</th><th>数值</th></tr>
                        <tr><td>🧠 大脑经验</td><td>${brain.total_experiences || 0}</td></tr>
                        <tr><td>📊 成功率</td><td>${(brain.success_rate * 100 || 0).toFixed(1)}%</td></tr>
                        <tr><td>🛒 商店商品</td><td>${market.total || 0}</td></tr>
                    </table>
                `;
            } catch(e) { console.error(e); }
        }
        
        async function loadPendingListings() {
            try {
                const res = await fetch('/api/marketplace/pending');
                const data = await res.json();
                const listings = data.listings || [];
                if (listings.length === 0) {
                    document.getElementById('pendingListings').innerHTML = '<div style="padding:20px;text-align:center;">暂无待审核申请</div>';
                    return;
                }
                let html = '<table><tr><th>ID</th><th>用户</th><th>技能名称</th><th>成熟度</th><th>操作</th></tr>';
                for (const l of listings) {
                    html += `<tr>
                        <td>${l.id}</td>
                        <td>${l.user_id}</td>
                        <td>${l.skill_chain?.name || '未命名'}</td>
                        <td><span style="color:#f59e0b;">${l.maturity_score}%</span></td>
                        <td><button class="success" onclick="approve('${l.id}')">批准上架</button>
                        <button class="danger" onclick="reject('${l.id}')">拒绝</button></td>
                    </tr>`;
                }
                html += '</table>';
                document.getElementById('pendingListings').innerHTML = html;
            } catch(e) { console.error(e); }
        }
        
        async function approve(listingId) {
            const res = await fetch(`/api/marketplace/approve/${listingId}`, {method: 'POST'});
            const data = await res.json();
            if (data.success) {
                alert('✅ 已批准上架');
                loadPendingListings();
                loadStats();
            }
        }
        
        async function reject(listingId) {
            // 拒绝逻辑（可扩展）
            alert('拒绝功能开发中');
        }
        
        loadStats();
        loadPendingListings();
        setInterval(loadStats, 30000);
    </script>
</body>
</html>
